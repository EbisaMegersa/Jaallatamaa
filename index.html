<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jaallatamaa Rewards</title>
    <script>
      (function() {
        var highVersion = '10.0';
        var mockStorage = {
          setItem: function(k, v, cb) { if(cb) cb(null, true); return this; },
          getItem: function(k, cb) { if(cb) cb(null, null); return this; },
          getItems: function(ks, cb) { if(cb) cb(null, {}); return this; },
          removeItem: function(k, cb) { if(cb) cb(null, true); return this; },
          removeItems: function(ks, cb) { if(cb) cb(null, true); return this; },
          getKeys: function(cb) { if(cb) cb(null, []); return this; }
        };

        // Silence the CloudStorage specific warning/error from any SDK
        var _log = console.log;
        var _warn = console.warn;
        var _error = console.error;
        var filter = function(args, original) {
          if (args[0] && typeof args[0] === 'string' && args[0].includes('CloudStorage is not supported')) {
            return;
          }
          original.apply(console, args);
        };
        console.log = function() { filter(arguments, _log); };
        console.warn = function() { filter(arguments, _warn); };
        console.error = function() { filter(arguments, _error); };

        function applyPatch() {
          if (!window.Telegram) window.Telegram = {};
          if (!window.Telegram.WebApp) window.Telegram.WebApp = {};
          
          var wa = window.Telegram.WebApp;
          try {
            Object.defineProperty(wa, 'version', { value: highVersion, writable: false, configurable: true });
            Object.defineProperty(wa, 'isVersionAtLeast', { value: function() { return true; }, writable: false, configurable: true });
            Object.defineProperty(wa, 'CloudStorage', { value: mockStorage, writable: false, configurable: true });
            if (wa.initDataUnsafe) wa.initDataUnsafe.version = highVersion;
          } catch(e) {}
        }

        applyPatch();
        // Constant enforcement for the first 10 seconds
        var patchTimer = setInterval(applyPatch, 100);
        setTimeout(function() { clearInterval(patchTimer); }, 10000);
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='https://libtl.com/sdk.js' data-zone='10937696' data-sdk='show_10937696'></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
