<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdWatch Rewards</title>
    <script>
      (function() {
        var mockStorage = {
          setItem: function(k, v, cb) { if(cb) cb(null, true); return this; },
          getItem: function(k, cb) { if(cb) cb(null, null); return this; },
          getItems: function(ks, cb) { if(cb) cb(null, {}); return this; },
          removeItem: function(k, cb) { if(cb) cb(null, true); return this; },
          removeItems: function(ks, cb) { if(cb) cb(null, true); return this; },
          getKeys: function(cb) { if(cb) cb(null, []); return this; }
        };

        function patch(wa) {
          try {
            if (!wa) return;
            // Force version to a high value
            const highVersion = '10.0';
            
            const forceProperty = (obj, prop, value, isGetter = false) => {
              try {
                const descriptor = Object.getOwnPropertyDescriptor(obj, prop);
                if (descriptor && !descriptor.configurable) {
                   // If not configurable, we can't redefine it, but maybe we can set it if it's writable
                   if (descriptor.writable) {
                     obj[prop] = value;
                   }
                   return;
                }
                
                const newDescriptor = isGetter ? {
                  get: function() { return value; },
                  set: function() {},
                  configurable: true,
                  enumerable: true
                } : {
                  value: value,
                  writable: false,
                  configurable: true,
                  enumerable: true
                };
                Object.defineProperty(obj, prop, newDescriptor);
              } catch(e) {}
            };

            forceProperty(wa, 'version', highVersion, true);
            forceProperty(wa, 'isVersionAtLeast', function() { return true; }, false);
            forceProperty(wa, 'CloudStorage', mockStorage, true);

            // Also mock initDataUnsafe version
            if (wa.initDataUnsafe) {
              wa.initDataUnsafe.version = highVersion;
            }
            
            // Mock version-check internally if possible
            if (wa._isVersionAtLeast) {
              wa._isVersionAtLeast = function() { return true; };
            }
          } catch(e) {}
        }

        // Intercept Telegram object creation and properties
        var _tg = window.Telegram;
        function setupTG(v) {
          if (!v) return;
          _tg = v;
          if (_tg.WebApp) patch(_tg.WebApp);
          else {
            // If WebApp not yet there, try to catch it
            var _wa;
            Object.defineProperty(_tg, 'WebApp', {
              get: function() { return _wa; },
              set: function(w) {
                _wa = w;
                if (w) patch(w);
              },
              configurable: true,
              enumerable: true
            });
          }
        }

        Object.defineProperty(window, 'Telegram', {
          get: function() { return _tg; },
          set: function(v) { setupTG(v); },
          configurable: true,
          enumerable: true
        });

        if (window.Telegram) setupTG(window.Telegram);

        // Polling as ultimate safety
        var interval = setInterval(function() {
          if (window.Telegram && window.Telegram.WebApp) {
            patch(window.Telegram.WebApp);
          }
        }, 5);
        setTimeout(function() { clearInterval(interval); }, 15000);
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='10937696' data-sdk='show_10937696'></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
