<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdWatch Rewards</title>
    <script>
      (function() {
        var mockStorage = {
          setItem: function(k, v, cb) { if(cb) cb(null, true); return this; },
          getItem: function(k, cb) { if(cb) cb(null, null); return this; },
          getItems: function(ks, cb) { if(cb) cb(null, {}); return this; },
          removeItem: function(k, cb) { if(cb) cb(null, true); return this; },
          removeItems: function(ks, cb) { if(cb) cb(null, true); return this; },
          getKeys: function(cb) { if(cb) cb(null, []); return this; }
        };

        function patch(wa) {
          try {
            // Force version to a high value
            Object.defineProperty(wa, 'version', {
              get: function() { return '8.0'; },
              set: function() {},
              configurable: true,
              enumerable: true
            });

            // Mock isVersionAtLeast to always return true
            wa.isVersionAtLeast = function() { return true; };

            // Force CloudStorage
            Object.defineProperty(wa, 'CloudStorage', {
              get: function() { return mockStorage; },
              set: function() {},
              configurable: true,
              enumerable: true
            });
          } catch(e) {}
        }

        // Intercept Telegram object creation
        var _tg = window.Telegram;
        Object.defineProperty(window, 'Telegram', {
          get: function() { return _tg; },
          set: function(v) {
            _tg = v;
            if (_tg && _tg.WebApp) patch(_tg.WebApp);
          },
          configurable: true,
          enumerable: true
        });

        // Polling as safety backup
        var interval = setInterval(function() {
          if (window.Telegram && window.Telegram.WebApp) {
            patch(window.Telegram.WebApp);
          }
        }, 10);
        setTimeout(function() { clearInterval(interval); }, 10000); // 10 seconds polling
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='https://libtl.com/sdk.js' data-zone='10937696' data-sdk='show_10937696'></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
