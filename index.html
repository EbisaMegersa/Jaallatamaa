    <meta charset="UTF-8" />

    <title>AdWatch Rewards</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Aggressive mock for CloudStorage to prevent "version not supported" errors in older Telegram clients
      (function() {
        var mock = {
          setItem: function(k, v, cb) { if(cb) cb(null, true); return this; },
          getItem: function(k, cb) { if(cb) cb(null, null); return this; },
          getItems: function(ks, cb) { if(cb) cb(null, {}); return this; },
          removeItem: function(k, cb) { if(cb) cb(null, true); return this; },
          removeItems: function(ks, cb) { if(cb) cb(null, true); return this; },
          getKeys: function(cb) { if(cb) cb(null, []); return this; }
        };

        function applyStub() {
          try {
            var tg = window.Telegram && window.Telegram.WebApp;
            if (tg) {
              // We use defineProperty with a getter to ensure we override any internal checks
              if (!tg.CloudStorage || (tg.version && parseFloat(tg.version) < 6.1)) {
                Object.defineProperty(tg, 'CloudStorage', {
                  get: function() { return mock; },
                  set: function(v) { /* prevent overwriting with restricted version */ },
                  enumerable: true,
                  configurable: true
                });
              }
              return true;
            }
          } catch (e) {}
          return false;
        }

        applyStub();
        var count = 0;
        var intv = setInterval(function() {
          if (applyStub() && count > 10) clearInterval(intv);
          if (count++ > 30) clearInterval(intv);
        }, 100);
      })();
    </script>
